[platformio]
default_envs = rak3172

; ─────────────────────────────────────────────────
; RAK3172 STM32WL53 target — primary MVP environment
; ─────────────────────────────────────────────────
[env:rak3172]
platform        = ststm32
board           = rak3172
framework       = stm32cube
monitor_speed   = 115200
upload_protocol = dfu           ; USB-C DFU bootloader (hold BOOT pin, press RESET)

; Build flag reference:
;   SEND_INTERVAL_MIN          uplink cadence in minutes (default 15)
;   GPS_FIX_TIMEOUT_S          how long to wait for a GPS fix per cycle
;   IMU_ACTIVITY_WINDOW_S      accel sampling window for activity classification
;   LOW_BATTERY_THRESHOLD_PCT  below this, batsave mode extends interval 4x
;   BATSAVE_MULTIPLIER         sleep-interval multiplier when batsave active
;   GPS_PWR_PIN                MCU pin driving the GPS VCC MOSFET gate (PA2)
;                              — omit if the board lacks the MOSFET circuit
build_flags =
    -D STM32WL55xx
    -D USE_FULL_LL_DRIVER
    -D LORAWAN_REGION_US915
    -D LORAWAN_CLASS_A
    -D GPS_UART_BAUD=9600
    -D GPS_UART_FAST_BAUD=115200
    -D SEND_INTERVAL_MIN=15
    -D GPS_FIX_TIMEOUT_S=90
    -D IMU_ACTIVITY_WINDOW_S=10
    -D LOW_BATTERY_THRESHOLD_PCT=15
    -D BATSAVE_MULTIPLIER=4
    -D GPS_PWR_PIN=PA2

lib_deps =
    ; LoRaWAN stack — RAK RUI3-compatible Arduino-LoRaWAN
    RAKwireless/RAK-STM32-RUI@^3
    ; I²C device library for MPU-6050 (Jeff Rowberg, MIT)
    jrowberg/I2Cdevlib-MPU6050@^1.0.0
    ; Tiny NMEA parser (no heap, MIT)
    kosme/TinyGPS++@^1.0.3

; ─────────────────────────────────────────────────
; Native host environment — for unit tests (pio test -e native)
; ─────────────────────────────────────────────────
[env:native]
platform  = native
build_src_filter = -<*>
test_build_src_filter = +<../test/>
; No lib_deps needed — tests are self-contained

; ─────────────────────────────────────────────────
; Heltec ESP32 LoRa V3 alternative (if RAK3172 unavailable)
; ─────────────────────────────────────────────────
[env:heltec]
platform      = espressif32
board         = heltec_wifi_lora_32_V3
framework     = arduino
monitor_speed = 115200

; Note: no GPS_PWR_PIN — Heltec ESP32 V3 has no MOSFET on the GPS rail in the
; reference wiring; firmware compiles gps_power_on/off as no-ops. If you add
; your own power-switch FET, define GPS_PWR_PIN here to match the GPIO used.
build_flags =
    -D HELTEC_ESP32
    -D LORAWAN_REGION_US915
    -D GPS_UART_BAUD=9600
    -D SEND_INTERVAL_MIN=15
    -D GPS_FIX_TIMEOUT_S=90
    -D BATSAVE_MULTIPLIER=4

lib_deps =
    HelTec-Aaron-Lee/Heltec ESP32 Dev-Boards@^2
    jrowberg/I2Cdevlib-MPU6050@^1.0.0
    kosme/TinyGPS++@^1.0.3
