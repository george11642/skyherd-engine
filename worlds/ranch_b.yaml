# Ranch B — "Mesa del Sol Ranch"
# 1.5km × 1.5km, 3 paddocks, 2 water tanks, 4 troughs, 6 fence lines, 35 cattle
# All positions in metres from SW origin (0,0)
# Geographically adjacent to ranch_a: ranch_b's WEST fence = ranch_a's EAST fence

name: ranch_b
bounds_m: [1500.0, 1500.0]

# ---------------------------------------------------------------------------
# Neighbor relationships
# ---------------------------------------------------------------------------
neighbors:
  - id: ranch_a
    shared_fence: west          # ranch_b's west boundary = ranch_a's east boundary
    shared_fence_segment_ids:
      - ranch_a:fence_east      # ranch_a's eastern perimeter fence
      - ranch_b:fence_west      # ranch_b's western perimeter fence

# ---------------------------------------------------------------------------
# Paddocks — 3 paddocks (south, NW, NE)
# ---------------------------------------------------------------------------
paddocks:
  - id: p_south
    polygon:
      - [10.0, 10.0]
      - [1490.0, 10.0]
      - [1490.0, 740.0]
      - [10.0, 740.0]

  - id: p_nw
    polygon:
      - [10.0, 760.0]
      - [740.0, 760.0]
      - [740.0, 1490.0]
      - [10.0, 1490.0]

  - id: p_ne
    polygon:
      - [760.0, 760.0]
      - [1490.0, 760.0]
      - [1490.0, 1490.0]
      - [760.0, 1490.0]

# ---------------------------------------------------------------------------
# Water tanks — 2 tanks
# ---------------------------------------------------------------------------
water_tanks:
  - id: wt_south
    pos: [750.0, 350.0]
    capacity_l: 6000.0
    level_pct: 78.0
    pressure_psi: 46.0

  - id: wt_north
    pos: [750.0, 1200.0]
    capacity_l: 5000.0
    level_pct: 88.0
    pressure_psi: 49.0

# ---------------------------------------------------------------------------
# Troughs — 4 troughs
# ---------------------------------------------------------------------------
troughs:
  - id: tr_south_1
    pos: [400.0, 400.0]
    paddock: p_south

  - id: tr_south_2
    pos: [1100.0, 500.0]
    paddock: p_south

  - id: tr_nw_1
    pos: [300.0, 1100.0]
    paddock: p_nw

  - id: tr_ne_1
    pos: [1100.0, 1100.0]
    paddock: p_ne

# ---------------------------------------------------------------------------
# Fence lines — 6 segments (perimeter N/E/S/W + 2 internal dividers)
# fence_west is the SHARED fence with ranch_a (adjacent to ranch_a's fence_east)
# ---------------------------------------------------------------------------
fence_lines:
  - id: fence_south
    segment: [[0.0, 0.0], [1500.0, 0.0]]
    tag: perimeter

  - id: fence_north
    segment: [[0.0, 1500.0], [1500.0, 1500.0]]
    tag: perimeter

  - id: fence_west
    segment: [[0.0, 0.0], [0.0, 1500.0]]
    tag: perimeter_shared
    neighbor_ranch: ranch_a
    neighbor_fence: fence_east

  - id: fence_east
    segment: [[1500.0, 0.0], [1500.0, 1500.0]]
    tag: perimeter

  - id: fence_internal_h
    segment: [[0.0, 750.0], [1500.0, 750.0]]
    tag: internal

  - id: fence_internal_v
    segment: [[750.0, 750.0], [750.0, 1500.0]]
    tag: internal

# ---------------------------------------------------------------------------
# Barn — NE corner
# ---------------------------------------------------------------------------
barn:
  pos: [1350.0, 1350.0]

