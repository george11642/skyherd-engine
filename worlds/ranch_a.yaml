# Ranch A — "Mesa Verde Ranch"
# 2km × 2km, 4 paddocks, 3 water tanks, 6 troughs, 8 fence segments, barn NE corner
# All positions in metres from SW origin (0,0)

name: ranch_a
bounds_m: [2000.0, 2000.0]

# ---------------------------------------------------------------------------
# Paddocks — 4 quadrant paddocks (each ~1km × 1km with slight insets)
# ---------------------------------------------------------------------------
paddocks:
  - id: p_sw
    polygon:
      - [10.0, 10.0]
      - [990.0, 10.0]
      - [990.0, 990.0]
      - [10.0, 990.0]

  - id: p_se
    polygon:
      - [1010.0, 10.0]
      - [1990.0, 10.0]
      - [1990.0, 990.0]
      - [1010.0, 990.0]

  - id: p_nw
    polygon:
      - [10.0, 1010.0]
      - [990.0, 1010.0]
      - [990.0, 1990.0]
      - [10.0, 1990.0]

  - id: p_ne
    polygon:
      - [1010.0, 1010.0]
      - [1990.0, 1010.0]
      - [1990.0, 1990.0]
      - [1010.0, 1990.0]

# ---------------------------------------------------------------------------
# Water tanks — 3 tanks at strategic locations
# ---------------------------------------------------------------------------
water_tanks:
  - id: wt_sw
    pos: [300.0, 300.0]
    capacity_l: 5000.0
    level_pct: 82.0
    pressure_psi: 48.0

  - id: wt_se
    pos: [1700.0, 250.0]
    capacity_l: 5000.0
    level_pct: 91.0
    pressure_psi: 47.0

  - id: wt_n
    pos: [1000.0, 1600.0]
    capacity_l: 8000.0
    level_pct: 15.0      # intentionally low to trigger water.low events
    pressure_psi: 22.0

# ---------------------------------------------------------------------------
# Troughs — 6 troughs (1-2 per paddock, fed from water tanks)
# ---------------------------------------------------------------------------
troughs:
  - id: tr_sw_1
    pos: [250.0, 500.0]
    paddock: p_sw

  - id: tr_sw_2
    pos: [700.0, 200.0]
    paddock: p_sw

  - id: tr_se_1
    pos: [1300.0, 400.0]
    paddock: p_se

  - id: tr_se_2
    pos: [1800.0, 700.0]
    paddock: p_se

  - id: tr_nw_1
    pos: [400.0, 1500.0]
    paddock: p_nw

  - id: tr_ne_1
    pos: [1600.0, 1400.0]
    paddock: p_ne

# ---------------------------------------------------------------------------
# Fence lines — 8 segments (perimeter N/E/S/W + 2 internal dividers crossing at centre)
# ---------------------------------------------------------------------------
fence_lines:
  - id: fence_south
    segment: [[0.0, 0.0], [2000.0, 0.0]]
    tag: perimeter

  - id: fence_north
    segment: [[0.0, 2000.0], [2000.0, 2000.0]]
    tag: perimeter

  - id: fence_west
    segment: [[0.0, 0.0], [0.0, 2000.0]]
    tag: perimeter

  - id: fence_east
    segment: [[2000.0, 0.0], [2000.0, 2000.0]]
    tag: perimeter

  - id: fence_internal_h
    segment: [[0.0, 1000.0], [2000.0, 1000.0]]
    tag: internal

  - id: fence_internal_v
    segment: [[1000.0, 0.0], [1000.0, 2000.0]]
    tag: internal

  - id: fence_gate_sw_se
    segment: [[995.0, 0.0], [1005.0, 0.0]]
    tag: gate

  - id: fence_gate_nw_ne
    segment: [[995.0, 2000.0], [1005.0, 2000.0]]
    tag: gate

# ---------------------------------------------------------------------------
# Barn — NE corner
# ---------------------------------------------------------------------------
barn:
  pos: [1850.0, 1850.0]

