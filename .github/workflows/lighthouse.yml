name: Lighthouse CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse >= 90
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build SPA
        run: pnpm run build

      - name: Run Lighthouse CI
        # lhci autorun collects, asserts categories:performance minScore 0.9,
        # and uploads the report to temporary-public-storage.
        run: pnpm dlx @lhci/cli@0.14 autorun
