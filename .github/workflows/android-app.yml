name: Android Companion App Build

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-app.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-app.yml'
  workflow_dispatch:

jobs:
  build:
    name: Gradle assembleDebug (unsigned)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper if missing
        working-directory: android/SkyHerdCompanion
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: Build unsigned debug APK
        working-directory: android/SkyHerdCompanion
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        continue-on-error: true     # H3-05: DJI SDK V5 artifact may be absent

      - name: Upload APK (if built)
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: skyherd-companion-android-apk
          path: android/SkyHerdCompanion/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30
